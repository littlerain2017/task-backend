<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>写作 · THE ROOM</title>
<style>
  :root {
    --ink: #F5F7FA;
    --ink-soft: rgba(245,247,250,.75);
    --muted: rgba(245,247,250,.5);
    --accent: #FFD100;
    --hairline: rgba(245,247,250,.2);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #000;
    color: var(--ink);
    font-family: "Songti SC", "Noto Serif SC", Georgia, serif;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px 10px;
    border-bottom: 1px solid var(--hairline);
  }
  .kicker { font-size: 12px; letter-spacing: .35em; color: var(--accent); white-space: nowrap; }
  #docSelect {
    flex: 1;
    min-width: 0;
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--hairline);
    border-radius: 8px;
    padding: 6px 8px;
    font-family: inherit;
    font-size: 14px;
  }
  #docSelect option { color: #000; }
  .btn {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--hairline);
    border-radius: 8px;
    padding: 6px 10px;
    font-family: inherit;
    font-size: 13px;
    white-space: nowrap;
  }
  .statusbar {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    padding: 8px 16px;
    font-size: 13px;
    color: var(--muted);
  }
  .counts b { color: var(--accent); font-weight: 700; font-variant-numeric: tabular-nums; }
  #syncState { text-align: right; }
  #syncState.ok { color: var(--accent); }
  #syncState.err { color: #FF6B5B; }
  #editor {
    flex: 1;
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    color: var(--ink);
    font-family: inherit;
    font-size: 17px;
    line-height: 1.9;
    padding: 8px 16px calc(24px + env(safe-area-inset-bottom));
  }
  #editor:disabled { color: var(--muted); }
  #setup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 32px;
    text-align: center;
    z-index: 10;
  }
  #setup.hidden { display: none; }
  #setup h1 { font-size: 18px; letter-spacing: .2em; }
  #setup p { font-size: 13px; color: var(--muted); line-height: 1.8; }
  #tokenInput {
    width: 100%;
    max-width: 380px;
    background: transparent;
    border: 1px dashed var(--hairline);
    border-radius: 10px;
    color: var(--accent);
    font-family: inherit;
    font-size: 16px;
    text-align: center;
    padding: 12px;
  }
  #setup .btn { color: var(--accent); border-color: var(--accent); padding: 10px 28px; }
</style>
</head>
<body>
  <div id="setup">
    <h1>THE ROOM · 写作</h1>
    <p>粘贴小程序「连接电脑」页里的配对令牌。<br>这里编辑的是你电脑写作文件夹里的同一批文件，双向同步。</p>
    <input id="tokenInput" placeholder="WRT-XXXXXXXX" autocomplete="off">
    <button class="btn" onclick="saveToken()">开始写作</button>
  </div>

  <header>
    <span class="kicker">THE ROOM</span>
    <select id="docSelect" onchange="openDoc(this.value)"></select>
    <button class="btn" onclick="newDoc()">新建</button>
    <button class="btn" onclick="copyDoc()">复制</button>
    <button class="btn" onclick="editToken()">令牌</button>
  </header>
  <div class="statusbar">
    <span class="counts">中文 <b id="cjkCount">0</b> 字 · 英文 <b id="enCount">0</b> 词</span>
    <span id="syncState">加载中…</span>
  </div>
  <textarea id="editor" placeholder="选择上方文件开始写…" oninput="onEdit()"></textarea>

<script>
const CJK_RE = /[一-鿿]/g;
const EN_RE = /[A-Za-z]+(?:'[A-Za-z]+)?/g;
const SAVE_DEBOUNCE_MS = 4000;
const REFRESH_MS = 20000;

let token = localStorage.getItem("writing_token") || "";
let docList = [];
let current = null;     // {name, updatedAt, readonly}
let dirty = false;
let saveTimer = null;

const $ = (id) => document.getElementById(id);

function setSync(text, cls) {
  $("syncState").textContent = text;
  $("syncState").className = cls || "";
}

function counts(text) {
  return { cjk: (text.match(CJK_RE) || []).length, en: (text.match(EN_RE) || []).length };
}

function renderCounts() {
  const c = counts($("editor").value);
  $("cjkCount").textContent = c.cjk;
  $("enCount").textContent = c.en;
}

function localDate() {
  const d = new Date();
  const p = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
}

async function api(path, payload) {
  const resp = await fetch(path, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ token, ...payload }),
  });
  return resp.json();
}

function renderSelect() {
  const sel = $("docSelect");
  sel.innerHTML = "";
  docList.forEach((d) => {
    const opt = document.createElement("option");
    opt.value = d.name;
    opt.textContent = d.name + (d.readonly ? "（只读）" : "");
    if (current && d.name === current.name) opt.selected = true;
    sel.appendChild(opt);
  });
}

async function loadList() {
  const data = await api("/writing/docs/list", {});
  if (!data.ok) throw new Error(data.error);
  docList = data.docs;
  renderSelect();
  if (docList.length === 0) {
    setSync("等待电脑首次同步，或点「新建」直接开写", "");
  }
}

async function openDoc(name) {
  if (dirty) await save();  // 切换前先保存
  const data = await api("/writing/docs/get", { name });
  if (!data.ok) {
    setSync(`打开失败：${data.error}`, "err");
    return;
  }
  current = { name, updatedAt: data.updatedAt, readonly: data.readonly };
  localStorage.setItem("writing_last_doc", name);
  $("editor").value = data.content;
  $("editor").disabled = data.readonly;
  renderCounts();
  renderSelect();
  setSync(data.readonly ? "只读（Word 文档请在电脑上编辑）" : "已就绪", "");
}

function onEdit() {
  dirty = true;
  renderCounts();
  setSync("编辑中…");
  clearTimeout(saveTimer);
  saveTimer = setTimeout(save, SAVE_DEBOUNCE_MS);
}

async function save() {
  if (!current || current.readonly || !dirty) return;
  const content = $("editor").value;
  try {
    const data = await api("/writing/docs/put", {
      name: current.name, content, editor: "web",
      date: localDate(), baseUpdatedAt: current.updatedAt,
    });
    if (data.ok) {
      dirty = false;
      current.updatedAt = data.updatedAt;
      const t = new Date();
      const p = (n) => String(n).padStart(2, "0");
      setSync(`已同步 ${p(t.getHours())}:${p(t.getMinutes())} · 今日 ${data.deltaCjk >= 0 ? "+" : ""}${data.deltaCjk} 字`, "ok");
    } else if (data.conflict) {
      localStorage.setItem("writing_conflict_backup", content);
      setSync("电脑上有更新的版本，已重新加载（你的改动暂存在本机）", "err");
      dirty = false;
      await openDoc(current.name);
    } else {
      throw new Error(data.error || "未知错误");
    }
  } catch (e) {
    setSync(`同步失败：${e.message}（8 秒后重试）`, "err");
    clearTimeout(saveTimer);
    saveTimer = setTimeout(save, 8000);
  }
}

async function newDoc() {
  let name = (window.prompt("新文件名（会同步到你的电脑文件夹）", "新篇章") || "").trim();
  if (!name) return;
  if (!/\.(md|txt)$/i.test(name)) name += ".md";
  const data = await api("/writing/docs/put", {
    name, content: "", editor: "web", date: localDate(), baseUpdatedAt: null,
  });
  if (!data.ok) {
    setSync(`新建失败：${data.error}`, "err");
    return;
  }
  await loadList();
  await openDoc(name);
}

function copyDoc() {
  navigator.clipboard.writeText($("editor").value).then(
    () => setSync("已复制全文", "ok"),
    () => setSync("复制失败", "err")
  );
}

function editToken() {
  $("tokenInput").value = token;
  $("setup").classList.remove("hidden");
}

async function saveToken() {
  const v = $("tokenInput").value.trim();
  if (!v) return;
  token = v;
  localStorage.setItem("writing_token", v);
  $("setup").classList.add("hidden");
  await boot();
}

async function refresh() {
  if (!token || dirty) return;
  try {
    await loadList();
    if (current) {
      const meta = docList.find((d) => d.name === current.name);
      if (meta && meta.updatedAt > current.updatedAt) await openDoc(current.name);
    }
  } catch (e) { /* 静默，下轮再试 */ }
}

async function boot() {
  try {
    await loadList();
    const last = localStorage.getItem("writing_last_doc");
    const first = docList.find((d) => d.name === last) || docList.find((d) => !d.readonly) || docList[0];
    if (first) await openDoc(first.name);
  } catch (e) {
    setSync(`连接失败：${e.message}`, "err");
  }
}

if (token) {
  $("setup").classList.add("hidden");
  boot();
}
setInterval(refresh, REFRESH_MS);
window.addEventListener("beforeunload", () => { if (dirty) save(); });
</script>
</body>
</html>
