<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Writing Machine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=Cormorant+Garamond:wght@500;600&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #171512;
    --header: rgba(23, 21, 18, 0.82);
    --ink: #e9e2d3;
    --ink-soft: #cfc6b2;
    --muted: #8a8172;
    --gold: #d3b25c;
    --gold-bright: #e8cd85;
    --green: #7d9c6a;
    --red: #c96a5a;
    --line: rgba(233, 226, 211, 0.12);
    --gold-line: rgba(211, 178, 92, 0.18);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Noto Serif SC", "Songti SC", Georgia, serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: background 0.4s;
  }
  ::selection { background: rgba(211, 178, 92, 0.28); }
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-thumb { background: #2e2a24; border-radius: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* ===== 吸顶栏 ===== */
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    width: 100%;
    display: flex;
    justify-content: center;
    background: var(--header);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(211, 178, 92, 0.10);
  }
  .header-inner {
    width: 100%;
    max-width: 860px;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 24px;
  }
  .wordmark {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-weight: 600;
    font-size: 19px;
    letter-spacing: 0.32em;
    color: var(--gold);
    white-space: nowrap;
  }
  .doc-box {
    display: flex;
    align-items: center;
    min-width: 0;
    max-width: 320px;
    flex: 1;
    background: rgba(255, 255, 255, 0.035);
    border: 1px solid var(--line);
    border-radius: 8px;
    transition: border-color 0.2s;
    position: relative;
  }
  .doc-box:hover { border-color: rgba(211, 178, 92, 0.4); }
  #docSelect {
    appearance: none;
    -webkit-appearance: none;
    width: 100%;
    background: transparent;
    color: var(--ink);
    border: none;
    outline: none;
    font-family: inherit;
    font-size: 14.5px;
    padding: 8px 30px 8px 14px;
    text-overflow: ellipsis;
    white-space: nowrap;
    overflow: hidden;
    cursor: pointer;
  }
  #docSelect option { color: #000; }
  .doc-box::after {
    content: "▾";
    position: absolute;
    right: 12px;
    color: var(--muted);
    font-size: 10px;
    pointer-events: none;
  }
  .actions { display: flex; gap: 8px; margin-left: auto; }
  .btn {
    font-family: inherit;
    font-size: 13.5px;
    color: #beb5a2;
    background: transparent;
    border: 1px solid rgba(233, 226, 211, 0.14);
    border-radius: 8px;
    padding: 8px 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .btn:hover { color: var(--gold-bright); border-color: rgba(211, 178, 92, 0.45); }

  /* ===== 元信息条 ===== */
  .meta {
    width: 100%;
    max-width: 860px;
    padding: 20px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.02em;
    flex-wrap: wrap;
  }
  .meta b { color: var(--gold); font-weight: 500; }
  .dot-sep { opacity: 0.5; margin: 0 6px; }

  /* 实时字数：右上角悬浮胶囊（与右下角计时器同款） */
  .count-pill {
    position: fixed;
    top: 72px;
    right: 24px;
    z-index: 20;
    background: rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--gold-line);
    border-radius: 999px;
    padding: 8px 18px;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .count-pill b { color: var(--gold); font-weight: 500; font-variant-numeric: tabular-nums; }
  .sync { display: flex; align-items: center; gap: 8px; }
  .sync-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
    transition: background 0.3s;
  }
  .sync-dot.ok { background: var(--green); }
  .sync-dot.busy { background: var(--gold); }
  .sync-dot.err { background: var(--red); }
  .sync .today { color: var(--gold); }
  #syncText.err { color: var(--red); }

  /* ===== 编辑器 ===== */
  #editor {
    width: 100%;
    max-width: var(--measure, 760px);
    padding: 48px 24px 45vh;
    font-size: var(--font-size, 19px);
    line-height: 2.05;
    letter-spacing: var(--tracking, 0.05em);
    color: var(--ink);
    caret-color: var(--gold);
    outline: none;
    text-wrap: pretty;
    word-break: break-word;
  }
  #editor .line { margin: 0 0 1.6em; text-indent: 2em; transition: opacity 0.45s ease; }
  #editor .line.h1 {
    font-size: 1.35em;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-indent: 0;
    margin-bottom: 0.6em;
  }
  #editor .line.h2 {
    font-size: 1.12em;
    font-weight: 500;
    color: var(--ink-soft);
    text-indent: 0;
    margin-bottom: 1.2em;
  }
  #editor .line.rule {
    text-indent: 0;
    text-align: center;
    color: #55503f;
    letter-spacing: 0.5em;
    margin: 2.2em 0;
  }
  #editor .line.blank { margin: 0 0 1.6em; text-indent: 0; }
  #editor.focus-on .line.dim { opacity: 0.28; }
  #editor[contenteditable="false"] { color: var(--muted); }

  /* 段落书签：鎏金左线 + 微金底 + 🔖 */
  #editor .line.marked {
    background: rgba(211, 178, 92, 0.07);
    border-left: 3px solid var(--gold);
    padding-left: 14px;
    margin-left: -17px;
    border-radius: 2px;
    position: relative;
  }
  #editor .line.marked::after {
    content: "🔖";
    position: absolute;
    right: -4px;
    top: 0;
    font-size: 0.7em;
    opacity: 0.7;
  }
  #editor.focus-on .line.marked.dim { opacity: 0.55; }  /* 专注模式下书签段落也别太暗 */

  /* ===== 剧本模式（Final Draft 规范：Courier 12pt、55 行/页 ≈ 1 分钟） ===== */
  /* 颜色完全跟随当前色调，只改字体与版式 */
  #editor.script {
    position: relative;
    font-family: "Courier Prime", "Courier New", Courier, monospace;
    --sc-lh: 24px;
    font-size: 15px;
    line-height: var(--sc-lh);
    letter-spacing: 0;
    width: min(74ch, calc(100vw - 24px));
    max-width: none;
    padding: calc(var(--sc-lh) * 2) 0 45vh;
    text-wrap: initial;
  }
  /* 分页线：每 55 行一页（一页一分钟） */
  #editor.script::before {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    top: calc(var(--sc-lh) * 2);
    bottom: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0,
      transparent calc(var(--sc-lh) * 55 - 1px),
      var(--gold-line) calc(var(--sc-lh) * 55 - 1px),
      var(--gold-line) calc(var(--sc-lh) * 55)
    );
  }
  #editor.script .line {
    margin: 0;
    text-indent: 0;
    padding-left: 8ch;
    padding-right: 8ch;
  }
  /* 元素语义色：场景=鎏金 / 人名=灰绿 / 对白=正文色 / 括号注=灰 / 转场=雾紫 */
  #editor.script .line.sc-scene {
    text-transform: uppercase;
    font-weight: 700;
    color: var(--gold);
  }
  #editor.script .line.sc-char {
    padding-left: 28ch;
    text-transform: uppercase;
    color: #96bd9c;
  }
  #editor.script .line.sc-dial {
    padding-left: 18ch;
    padding-right: 20ch;
  }
  #editor.script .line.sc-paren {
    padding-left: 22ch;
    padding-right: 24ch;
    color: var(--muted);
    font-style: italic;
  }
  #editor.script .line.sc-trans {
    text-align: right;
    text-transform: uppercase;
    color: #a89bc9;
  }
  #editor.script .line.sc-action {
    color: var(--ink-soft);
  }

  .btn.on { color: var(--gold); border-color: rgba(211, 178, 92, 0.5); }

  /* ===== 计时器胶囊 ===== */
  .timer {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--gold-line);
    border-radius: 999px;
    padding: 8px 10px 8px 16px;
  }
  .timer { padding: 8px 18px; }
  .timer .t-label {
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--muted);
    white-space: nowrap;
  }
  .timer .clock {
    font-size: 22px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
    text-align: center;
    color: #beb5a2;
    transition: color 0.3s;
  }
  .timer .clock.running { color: var(--gold-bright); }

  /* 底部渐隐 */
  .fade {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    pointer-events: none;
    height: 90px;
    background: linear-gradient(to top, var(--bg), transparent);
    transition: background 0.4s;
  }

  /* ===== 设置面板 ===== */
  #prefs {
    position: fixed;
    top: 64px;
    right: 16px;
    z-index: 30;
    width: 250px;
    background: var(--header);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--gold-line);
    border-radius: 12px;
    padding: 18px;
    display: none;
    flex-direction: column;
    gap: 16px;
    font-size: 13px;
    color: var(--muted);
  }
  #prefs.open { display: flex; }
  #prefs .row { display: flex; flex-direction: column; gap: 8px; }
  #prefs .row-title { letter-spacing: 0.1em; font-size: 12px; }
  .tones { display: flex; gap: 8px; }
  .tone {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid var(--line);
    cursor: pointer;
  }
  .tone.active { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(211, 178, 92, 0.3); }
  #prefs input[type="range"] { width: 100%; accent-color: var(--gold); }
  .switch { display: flex; justify-content: space-between; align-items: center; color: var(--ink-soft); }

  /* ===== 书签总览面板 ===== */
  #marksPanel {
    position: fixed;
    top: 64px;
    right: 16px;
    z-index: 30;
    width: 320px;
    max-width: calc(100vw - 32px);
    max-height: 70vh;
    overflow-y: auto;
    background: var(--header);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--gold-line);
    border-radius: 12px;
    padding: 14px;
    display: none;
    flex-direction: column;
    gap: 4px;
    font-size: 13px;
  }
  #marksPanel.open { display: flex; }
  #marksPanel .mp-doc {
    font-size: 12px;
    letter-spacing: 0.06em;
    color: var(--gold);
    padding: 10px 6px 4px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 4px;
  }
  #marksPanel .mp-item {
    display: flex;
    gap: 8px;
    align-items: baseline;
    padding: 7px 8px;
    border-radius: 8px;
    color: var(--ink-soft);
    cursor: pointer;
    line-height: 1.6;
  }
  #marksPanel .mp-item:hover { background: rgba(211, 178, 92, 0.10); color: var(--ink); }
  #marksPanel .mp-item .bk { font-size: 11px; flex-shrink: 0; }
  #marksPanel .mp-empty { color: var(--muted); text-align: center; padding: 24px 8px; line-height: 1.9; }

  /* ===== 书架（全屏入口） ===== */
  #shelfView {
    position: fixed;
    inset: 0;
    z-index: 25;
    background: #000;
    display: none;
    overflow: hidden;
  }
  #shelfView.open { display: block; }
  /* 底层：银河全景（ESO 360° panorama），压暗调灰做深空底 */
  #shelfBg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: grayscale(0.85) brightness(0.42);
    transform: scale(1.06);
    transition: transform 0.3s ease-out;
  }
  /* 中层：Canvas 实时三维星点 */
  #starCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  /* 顶层：内容 */
  .shelf-content {
    position: relative;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-y: auto;
    padding: 9vh 24px 12vh;
  }
  .shelf-title {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-weight: 600;
    font-size: clamp(26px, 5vw, 44px);
    letter-spacing: 0.38em;
    color: var(--gold);
    text-indent: 0.38em;
    text-align: center;
  }
  .shelf-sub {
    margin: 10px 0 7vh;
    font-size: 13px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-indent: 0.3em;
  }
  .shelf-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 26px;
    width: 100%;
    max-width: 900px;
  }
  .book-card {
    width: 250px;
    min-height: 150px;
    padding: 26px 24px 20px;
    border: 1px solid var(--gold-line);
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.25s, box-shadow 0.35s;
    animation: bookFloat 7s ease-in-out infinite;
  }
  .book-card:nth-child(2n) { animation-delay: -2.3s; }
  .book-card:nth-child(3n) { animation-delay: -4.6s; }
  .book-card:hover {
    transform: translateY(-10px);
    border-color: rgba(211, 178, 92, 0.5);
    box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6);
    animation-play-state: paused;
  }
  @keyframes bookFloat {
    0%, 100% { translate: 0 0; }
    50% { translate: 0 -7px; }
  }
  .book-card .bc-name {
    font-family: "Cormorant Garamond", "Noto Serif SC", Georgia, serif;
    font-size: 21px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: 0.05em;
    line-height: 1.4;
  }
  .book-card .bc-meta { margin-top: auto; font-size: 12.5px; color: var(--muted); }
  .book-card .bc-bar {
    height: 2px;
    background: var(--gold-line);
    border-radius: 1px;
    overflow: hidden;
  }
  .book-card .bc-bar i { display: block; height: 100%; background: var(--gold); }
  .book-card.new {
    border-style: dashed;
    align-items: center;
    justify-content: center;
    color: var(--gold);
    font-size: 15px;
    letter-spacing: 0.1em;
    background: transparent;
  }
  @media (max-width: 600px) {
    .book-card { width: 100%; min-height: 110px; }
  }

  /* ===== 令牌配置浮层 ===== */
  #setup {
    position: fixed;
    inset: 0;
    background: rgba(13, 12, 10, 0.94);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 32px;
    text-align: center;
    z-index: 40;
  }
  #setup.hidden { display: none; }
  #setup h1 {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 20px;
    letter-spacing: 0.32em;
    color: var(--gold);
  }
  #setup p { font-size: 13px; color: var(--muted); line-height: 1.9; }
  #tokenInput {
    width: 100%;
    max-width: 380px;
    background: transparent;
    border: 1px dashed var(--gold-line);
    border-radius: 10px;
    color: var(--gold);
    font-family: inherit;
    font-size: 16px;
    text-align: center;
    padding: 12px;
    outline: none;
  }
  #setup .btn { color: var(--gold); border-color: rgba(211, 178, 92, 0.45); padding: 10px 28px; }

  @media (max-width: 560px) {
    .header-inner { padding: 12px 14px; gap: 8px; }
    .wordmark { font-size: 15px; letter-spacing: 0.22em; }
    .btn { padding: 7px 10px; font-size: 12.5px; }
    .meta { padding: 16px 16px 0; }
    #editor { padding: 32px 16px 45vh; }
    .timer { bottom: 14px; right: 12px; gap: 9px; padding: 7px 8px 7px 13px; }
    .count-pill { top: 60px; right: 12px; padding: 6px 13px; font-size: 12px; }
  }
</style>
</head>
<body>
  <div id="setup">
    <h1>WRITING MACHINE</h1>
    <p>粘贴小程序「连接电脑」页里的配对令牌。<br>这里编辑的是你电脑写作文件夹里的同一批文件，双向同步。</p>
    <input id="tokenInput" placeholder="WRT-XXXXXXXX" autocomplete="off">
    <button class="btn" onclick="saveToken()">开始写作</button>
  </div>

  <header>
    <div class="header-inner">
      <div class="wordmark shelf-trigger" onclick="openShelf()" style="cursor: pointer;" title="回到书架">WRITING MACHINE</div>
      <div class="doc-box"><select id="docSelect" onchange="openDoc(this.value)"></select></div>
      <div class="actions">
        <button class="btn" id="modeBtn" onclick="toggleScriptMode()" title="剧本模式（Final Draft 格式）">剧本</button>
        <button class="btn" onclick="newDoc()">新建</button>
        <button class="btn" onclick="copyDoc()">复制</button>
        <button class="btn" onclick="toggleMark()" title="标记/取消标记当前段落（⌘M），⌘⇧M 跳转书签">标记</button>
        <button class="btn" onclick="toggleMarksPanel()" title="查看全部书签">书签</button>
        <button class="btn" onclick="editToken()">令牌</button>
        <button class="btn" onclick="togglePrefs()" title="阅读舒适度（⌘D）">Aa</button>
      </div>
    </div>
  </header>

  <!-- 今日新增：右上角常驻（与小程序大数字同源） -->
  <div class="count-pill">
    今日 <b id="todayDelta">+0</b> 字
  </div>

  <div class="meta">
    <div>中文 <b id="cjkCount">0</b> 字 <span class="dot-sep">·</span> 英文 <b id="enCount">0</b> 词<span id="pageInfo" style="display:none"><span class="dot-sep">·</span>约 <b id="pageCount">1</b> 页 / <b id="minCount">1</b> 分钟</span></div>
    <div class="sync">
      <span class="sync-dot" id="syncDot"></span>
      <span id="syncText">加载中…</span>
    </div>
  </div>

  <main id="editor" contenteditable="true" spellcheck="false"></main>

  <div class="timer" title="今日实际打字时长，自动计时，停笔 1 分钟暂停">
    <span class="t-label">写作时长</span>
    <span class="clock" id="activeClock">00:00</span>
  </div>

  <div class="fade"></div>

  <div id="marksPanel"></div>

  <div id="shelfView">
    <img id="shelfBg" src="/writing/shelf-bg.jpg" alt="">
    <canvas id="starCanvas"></canvas>
    <div class="shelf-content">
      <div class="shelf-title">WRITING MACHINE</div>
      <div class="shelf-grid" id="shelfGrid" style="margin-top: 7vh;"></div>
    </div>
  </div>

  <div id="prefs">
    <div class="row">
      <span class="row-title">色调</span>
      <div class="tones" id="toneRow"></div>
    </div>
    <div class="row">
      <span class="row-title">字号 <span id="fontSizeVal">19</span>px</span>
      <input type="range" min="16" max="24" step="1" id="fontSizeRange" oninput="setPref('fontSize', +this.value)">
    </div>
    <div class="row">
      <span class="row-title">行宽 <span id="measureVal">760</span>px</span>
      <input type="range" min="600" max="960" step="20" id="measureRange" oninput="setPref('measure', +this.value)">
    </div>
    <div class="row">
      <span class="row-title">字距 <span id="trackingVal">0.05</span>em</span>
      <input type="range" min="0" max="0.12" step="0.01" id="trackingRange" oninput="setPref('tracking', +this.value)">
    </div>
    <div class="switch">
      <span>专注模式</span>
      <input type="checkbox" id="focusToggle" onchange="setPref('focus', this.checked)" style="accent-color: var(--gold);">
    </div>
  </div>

<script>
const CJK_RE = /[一-鿿]/g;
const EN_RE = /[A-Za-z]+(?:'[A-Za-z]+)?/g;
const SAVE_DEBOUNCE_MS = 4000;
const REFRESH_MS = 20000;
const TYPING_IDLE_MS = 5000;  // 停笔 5 秒计时即暂停（句内停顿不断流）

const TONES = {
  "暖黑":   { bg: "#171512", header: "rgba(23,21,18,0.82)",  ink: "#e9e2d3" },
  "纯黑":   { bg: "#0d0c0b", header: "rgba(13,12,11,0.82)",  ink: "#e6e1d6" },
  "墨绿":   { bg: "#141a16", header: "rgba(20,26,22,0.82)",  ink: "#e4e6d9" },
  "藏蓝":   { bg: "#13161d", header: "rgba(19,22,29,0.82)",  ink: "#e2e4e6" },
  "咖啡褐": { bg: "#1b1512", header: "rgba(27,21,18,0.82)",  ink: "#ecdfd0" },
};

let token = localStorage.getItem("writing_token") || "";
let docList = [];
let current = null;
let dirty = false;
let saveTimer = null;
let serverActiveMs = 0;
let pendingActiveMs = Number(localStorage.getItem("writing_pending_active") || 0);
let lastKeyTs = 0;
let prefs = Object.assign(
  { tone: "暖黑", fontSize: 19, measure: 760, tracking: 0.05, focus: true },
  JSON.parse(localStorage.getItem("writing_prefs") || "{}")
);

const $ = (id) => document.getElementById(id);
const editor = $("editor");

/* ===== 阅读舒适度 ===== */
function applyPrefs() {
  const t = TONES[prefs.tone] || TONES["暖黑"];
  const r = document.documentElement.style;
  r.setProperty("--bg", t.bg);
  r.setProperty("--header", t.header);
  r.setProperty("--ink", t.ink);
  r.setProperty("--font-size", prefs.fontSize + "px");
  r.setProperty("--measure", prefs.measure + "px");
  r.setProperty("--tracking", prefs.tracking + "em");
  editor.classList.toggle("focus-on", prefs.focus);
  if (!prefs.focus) editor.querySelectorAll(".line.dim").forEach((n) => n.classList.remove("dim"));
  $("fontSizeVal").textContent = prefs.fontSize;
  $("measureVal").textContent = prefs.measure;
  $("trackingVal").textContent = prefs.tracking.toFixed(2);
  $("fontSizeRange").value = prefs.fontSize;
  $("measureRange").value = prefs.measure;
  $("trackingRange").value = prefs.tracking;
  $("focusToggle").checked = prefs.focus;
  document.querySelectorAll(".tone").forEach((el) =>
    el.classList.toggle("active", el.dataset.tone === prefs.tone));
}

function setPref(key, val) {
  prefs[key] = val;
  localStorage.setItem("writing_prefs", JSON.stringify(prefs));
  applyPrefs();
}

function togglePrefs() { $("prefs").classList.toggle("open"); }

// ⌘D（Windows 上 Ctrl+D）呼出/收起调整面板；⌘S 回到上次修改的地方并立即保存
document.addEventListener("keydown", (e) => {
  if (!(e.metaKey || e.ctrlKey) || e.altKey) return;
  const key = e.key.toLowerCase();
  if (key === "d" && !e.shiftKey) {
    e.preventDefault();  // 拦截浏览器默认的“添加书签”
    togglePrefs();
  } else if (key === "s") {  // ⌘S 或 ⌘⇧S 都可以
    e.preventDefault();  // 拦截浏览器默认的“保存网页”
    jumpToLastEdit();
    if (dirty) save();
  } else if (key === "m") {
    e.preventDefault();
    if (e.shiftKey) jumpNextMark();  // ⌘⇧M 在书签间跳转
    else toggleMark();               // ⌘M 标记/取消当前段落
  }
});

/* ===== 段落书签 ===== */
function caretBlock() {
  const sel = document.getSelection();
  if (!sel || !sel.anchorNode || !editor.contains(sel.anchorNode)) return null;
  let n = sel.anchorNode;
  while (n && n.parentNode !== editor) n = n.parentNode;
  return n && n.nodeType === Node.ELEMENT_NODE ? n : null;
}

function applyMarks() {
  if (!current) return;
  const marks = new Set(current.marks || []);
  editor.childNodes.forEach((node) => {
    if (node.nodeType !== Node.ELEMENT_NODE) return;
    const text = node.textContent.trim();
    node.classList.toggle("marked", text !== "" && marks.has(text));
  });
}

function toggleMark() {
  if (!current) return;
  const block = caretBlock();
  const text = block ? block.textContent.trim() : "";
  if (!text) {
    setSync("先把光标放到要标记的段落里", "");
    return;
  }
  const marks = new Set(current.marks || []);
  if (marks.has(text)) {
    marks.delete(text);
    setSync("已取消标记", "ok");
  } else {
    marks.add(text);
    setSync("已标记 🔖（⌘⇧M 可跳转回来）", "ok");
  }
  current.marks = Array.from(marks);
  const meta = docList.find((d) => d.name === current.name);
  if (meta) meta.marks = current.marks;  // 书签面板保持最新
  applyMarks();
  api("/writing/docs/marks", { name: current.name, marks: current.marks })
    .catch(() => setSync("书签保存失败，稍后自动重试", "err"));
}

/* ===== 书签总览面板 ===== */
async function toggleMarksPanel() {
  const panel = $("marksPanel");
  if (panel.classList.contains("open")) {
    panel.classList.remove("open");
    return;
  }
  try { await loadList(); } catch (e) { /* 用缓存的 docList 也能渲染 */ }
  renderMarksPanel();
  panel.classList.add("open");
}

function renderMarksPanel() {
  const panel = $("marksPanel");
  panel.innerHTML = "";
  let total = 0;
  docList.forEach((d) => {
    const marks = d.marks || [];
    if (marks.length === 0) return;
    total += marks.length;
    const head = document.createElement("div");
    head.className = "mp-doc";
    head.textContent = d.name;
    panel.appendChild(head);
    marks.forEach((text) => {
      const item = document.createElement("div");
      item.className = "mp-item";
      const bk = document.createElement("span");
      bk.className = "bk";
      bk.textContent = "🔖";
      const span = document.createElement("span");
      span.textContent = text.length > 42 ? text.slice(0, 42) + "…" : text;
      item.appendChild(bk);
      item.appendChild(span);
      item.onclick = () => gotoMark(d.name, text);
      panel.appendChild(item);
    });
  });
  if (total === 0) {
    const empty = document.createElement("div");
    empty.className = "mp-empty";
    empty.textContent = "还没有书签。光标放进段落里按 ⌘M（或点「标记」）就能收藏在这里。";
    panel.appendChild(empty);
  }
}

async function gotoMark(name, text) {
  $("marksPanel").classList.remove("open");
  if (!current || current.name !== name) await openDoc(name);
  const target = Array.prototype.find.call(
    editor.childNodes,
    (n) => n.nodeType === Node.ELEMENT_NODE && n.textContent.trim() === text
  );
  if (!target) {
    setSync("该书签对应的段落已被修改或删除", "");
    return;
  }
  editor.focus();
  const sel = document.getSelection();
  const range = document.createRange();
  range.setStart(target, 0);
  range.collapse(true);
  sel.removeAllRanges();
  sel.addRange(range);
  target.scrollIntoView({ behavior: "smooth", block: "center" });
}

function jumpNextMark() {
  const marked = Array.from(editor.querySelectorAll(".line.marked"));
  if (marked.length === 0) {
    setSync("还没有书签（光标放段落里按 ⌘M 标记）", "");
    return;
  }
  const cur = caretBlock();
  const curIdx = cur ? marked.indexOf(cur) : -1;
  const target = marked[(curIdx + 1) % marked.length];
  editor.focus();
  const sel = document.getSelection();
  const range = document.createRange();
  range.setStart(target, 0);
  range.collapse(true);
  sel.removeAllRanges();
  sel.addRange(range);
  target.scrollIntoView({ behavior: "smooth", block: "center" });
  setSync(`书签 ${marked.indexOf(target) + 1} / ${marked.length}`, "ok");
}

/* ===== 记住并跳回上次修改的位置 ===== */
let lastEditPos = JSON.parse(localStorage.getItem("writing_lastedit") || "{}");

function rememberEditPos() {
  const sel = document.getSelection();
  if (!current || !sel || !sel.anchorNode || !editor.contains(sel.anchorNode)) return;
  let block = sel.anchorNode;
  while (block && block.parentNode !== editor) block = block.parentNode;
  if (!block) return;
  const lineIndex = Array.prototype.indexOf.call(editor.childNodes, block);
  const range = document.createRange();
  range.setStart(block, 0);
  range.setEnd(sel.anchorNode, sel.anchorOffset);
  lastEditPos[current.name] = { line: lineIndex, offset: range.toString().length };
  localStorage.setItem("writing_lastedit", JSON.stringify(lastEditPos));
}

function lastNonEmptyIndex() {
  for (let i = editor.childNodes.length - 1; i >= 0; i--) {
    if (editor.childNodes[i].textContent.trim() !== "") return i;
  }
  return editor.childNodes.length - 1;
}

function jumpToLastEdit() {
  if (!current || editor.childNodes.length === 0) return;
  let pos = lastEditPos[current.name];
  if (!pos) {
    // 本文件还没有记录过落笔位置 → 跳到全文末尾
    const i = lastNonEmptyIndex();
    pos = { line: i, offset: editor.childNodes[i].textContent.length };
    setSync("跳到全文末尾（打字后 ⌘S 会记住确切位置）", "ok");
  } else {
    setSync("已回到上次落笔处", "ok");
  }
  const block = editor.childNodes[Math.min(pos.line, editor.childNodes.length - 1)];
  if (!block) return;
  // 在块内按字符偏移找到落点
  let remaining = pos.offset;
  let target = block, targetOffset = 0;
  const walker = document.createTreeWalker(block, NodeFilter.SHOW_TEXT);
  let node;
  while ((node = walker.nextNode())) {
    if (remaining <= node.textContent.length) {
      target = node;
      targetOffset = remaining;
      break;
    }
    remaining -= node.textContent.length;
  }
  editor.focus();
  const sel = document.getSelection();
  const range = document.createRange();
  try {
    range.setStart(target, targetOffset);
  } catch (e) {
    range.setStart(block, 0);
  }
  range.collapse(true);
  sel.removeAllRanges();
  sel.addRange(range);
  (block.scrollIntoView ? block : editor).scrollIntoView({ behavior: "smooth", block: "center" });
}
document.addEventListener("click", (e) => {
  if (!$("prefs").contains(e.target) && !e.target.closest(".actions")) $("prefs").classList.remove("open");
  if (!$("marksPanel").contains(e.target) && !e.target.closest(".actions")) $("marksPanel").classList.remove("open");
});

Object.keys(TONES).forEach((name) => {
  const el = document.createElement("div");
  el.className = "tone";
  el.dataset.tone = name;
  el.title = name;
  el.style.background = TONES[name].bg;
  el.onclick = () => setPref("tone", name);
  $("toneRow").appendChild(el);
});

/* ===== 剧本模式（Final Draft 元素识别） ===== */
const LINES_PER_PAGE = 55;  // 一页一分钟
const SCENE_RE = /^(INT|EXT|EST|I\/E|INT\/EXT)[.\s]|^(内景|外景|内[.．·]|外[.．·])/i;
const TRANS_RE = /^>|TO:\s*$|^(FADE (IN|OUT)|CUT TO|DISSOLVE)|(切至|转场|淡入|淡出)[:：]?\s*$/i;
const CHAR_LATIN_RE = /^[A-Z][A-Z0-9 .'\-()]{0,31}$/;
const PAREN_RE = /^[(（]/;
const SENTENCE_END_RE = /[。！？…，,.;；、!?]$/;
const HAS_CJK_RE = /[一-鿿]/;

let scriptModes = JSON.parse(localStorage.getItem("writing_script_modes") || "{}");

function isScriptMode() {
  if (!current) return false;
  if (current.name in scriptModes) return scriptModes[current.name];
  return /剧本|screenplay|script|scene|\.fountain$/i.test(current.name);  // 按文件名自动开启
}

function toggleScriptMode() {
  if (!current) return;
  scriptModes[current.name] = !isScriptMode();
  localStorage.setItem("writing_script_modes", JSON.stringify(scriptModes));
  applyMode();
  reclassify();
  renderCounts();
}

function applyMode() {
  const on = isScriptMode();
  editor.classList.toggle("script", on);
  $("modeBtn").classList.toggle("on", on);
  $("pageInfo").style.display = on ? "" : "none";
}

/** 剧本元素识别：整篇有状态扫描（对白依赖前一行是角色） */
function classifyScriptLines(lines) {
  const types = [];
  for (let i = 0; i < lines.length; i++) {
    const t = lines[i].trim();
    const prev = i > 0 ? types[i - 1] : "blank";
    const next = i + 1 < lines.length ? lines[i + 1].trim() : "";
    let type;
    if (t === "") type = "blank";
    else if (SCENE_RE.test(t)) type = "scene";
    else if (TRANS_RE.test(t)) type = "trans";
    else if (PAREN_RE.test(t) && (prev === "char" || prev === "dial" || prev === "paren")) type = "paren";
    else if (prev === "char" || prev === "paren" || prev === "dial") type = "dial";
    else if (prev === "blank" && next !== "" &&
             (t.startsWith("@") || CHAR_LATIN_RE.test(t) ||
              (HAS_CJK_RE.test(t) && t.length <= 8 && !SENTENCE_END_RE.test(t)))) type = "char";
    else type = "action";
    types.push(type);
  }
  return types;
}

const SCRIPT_CLASS = { blank: "blank", scene: "sc-scene", trans: "sc-trans",
                       paren: "sc-paren", dial: "sc-dial", char: "sc-char", action: "sc-action" };
// 各元素每行可容纳的列数（中文按 2 列计），用于估算换行后的实际行数
const SCRIPT_CPL = { scene: 58, action: 58, dial: 36, paren: 28, char: 40, trans: 58, blank: 58 };

function colWidth(text) {
  let w = 0;
  for (const ch of text) w += /[ᄀ-￦]/.test(ch) ? 2 : 1;
  return w;
}

function updatePageInfo(lines, types) {
  let total = 0;
  for (let i = 0; i < lines.length; i++) {
    const t = lines[i].trim();
    total += t === "" ? 1 : Math.max(1, Math.ceil(colWidth(t) / SCRIPT_CPL[types[i]]));
  }
  const pages = Math.max(1, Math.ceil(total / LINES_PER_PAGE));
  $("pageCount").textContent = pages;
  $("minCount").textContent = pages;
}

/* ===== 逐行渲染编辑器 ===== */
function classify(text) {
  if (/^---+\s*$/.test(text)) return "rule";
  if (/^#\s/.test(text)) return "h1";
  if (/^#{2,}\s/.test(text)) return "h2";
  if (text.trim() === "") return "blank";
  return "";
}

function setEditorContent(text) {
  editor.innerHTML = "";
  const frag = document.createDocumentFragment();
  text.split("\n").forEach((lineText) => {
    const div = document.createElement("div");
    div.className = ("line " + classify(lineText)).trim();
    if (lineText === "") div.appendChild(document.createElement("br"));
    else div.textContent = lineText;
    frag.appendChild(div);
  });
  if (!text) {
    const div = document.createElement("div");
    div.className = "line blank";
    div.appendChild(document.createElement("br"));
    frag.appendChild(div);
  }
  editor.appendChild(frag);
}

function getEditorContent() {
  const lines = [];
  editor.childNodes.forEach((node) => {
    if (node.nodeType === Node.TEXT_NODE) lines.push(node.textContent);
    else lines.push(node.textContent.replace(/\n/g, ""));
  });
  return lines.join("\n");
}

function reclassify() {
  const nodes = Array.prototype.filter.call(editor.childNodes, (n) => n.nodeType === Node.ELEMENT_NODE);
  const script = isScriptMode();
  let types = null;
  let lines = null;
  if (script) {
    lines = nodes.map((n) => n.textContent);
    types = classifyScriptLines(lines);
  }
  nodes.forEach((node, i) => {
    const kind = script ? SCRIPT_CLASS[types[i]] : classify(node.textContent);
    const cls = ("line " + kind).trim();
    const keepDim = node.classList.contains("dim") ? " dim" : "";
    if (node.className !== cls + keepDim) node.className = cls + keepDim;
  });
  if (script) updatePageInfo(lines, types);
}

editor.addEventListener("paste", (e) => {
  e.preventDefault();
  const text = (e.clipboardData || window.clipboardData).getData("text/plain");
  document.execCommand("insertText", false, text);
});

/* ===== 专注模式 ===== */
function applyFocus() {
  if (!prefs.focus) return;
  const sel = document.getSelection();
  let block = null;
  if (sel && sel.anchorNode && editor.contains(sel.anchorNode) && document.activeElement === editor) {
    let n = sel.anchorNode;
    while (n && n.parentNode !== editor) n = n.parentNode;
    block = n;
  }
  editor.childNodes.forEach((node) => {
    if (node.nodeType !== Node.ELEMENT_NODE) return;
    node.classList.toggle("dim", !!block && node !== block);
  });
}
document.addEventListener("selectionchange", applyFocus);
editor.addEventListener("blur", () =>
  editor.querySelectorAll(".line.dim").forEach((n) => n.classList.remove("dim")));

/* ===== 字数 / 状态 ===== */
function counts(text) {
  return { cjk: (text.match(CJK_RE) || []).length, en: (text.match(EN_RE) || []).length };
}


function renderCounts() {
  const c = counts(getEditorContent());
  $("cjkCount").textContent = c.cjk.toLocaleString();
  $("enCount").textContent = c.en.toLocaleString();
  renderActiveClock();
}

function setSync(text, cls) {
  $("syncText").textContent = text;
  $("syncText").className = cls === "err" ? "err" : "";
  $("syncDot").className = "sync-dot " + (cls || "");
}

function setTodayDelta(delta) {
  if (typeof delta !== "number") return;
  $("todayDelta").textContent = `${delta >= 0 ? "+" : ""}${delta.toLocaleString()}`;
}

function trackTyping() {
  // 只标记「正在打字」；时长由每秒的 tickActive 累计，避免双重计数
  lastKeyTs = Date.now();
}

function isTypingNow() {
  return lastKeyTs && Date.now() - lastKeyTs <= TYPING_IDLE_MS;
}

function tickActive() {
  if (isTypingNow()) {
    pendingActiveMs += 1000;
    localStorage.setItem("writing_pending_active", String(pendingActiveMs));
  }
  renderActiveClock();
}

function renderActiveClock() {
  const totalSec = Math.floor((serverActiveMs + pendingActiveMs) / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  const p = (n) => String(n).padStart(2, "0");
  $("activeClock").textContent = h > 0 ? `${p(h)}:${p(m)}:${p(s)}` : `${p(m)}:${p(s)}`;
  $("activeClock").classList.toggle("running", isTypingNow());
}

function localDate() {
  const d = new Date();
  const p = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
}

/* ===== 同步 ===== */
async function api(path, payload) {
  const resp = await fetch(path, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ token, ...payload }),
  });
  if (!resp.ok) throw new Error(`服务器错误 ${resp.status}`);
  return resp.json();
}

/* ===== 书架：子文件夹 = 一本书，根目录 = 主书架 ===== */
let currentBook = localStorage.getItem("writing_book") || "";

function bookOf(name) {
  const i = name.indexOf("/");
  return i < 0 ? "" : name.slice(0, i);
}

function fileLabel(name) {
  const i = name.indexOf("/");
  return i < 0 ? name : name.slice(i + 1);
}

function bookLabel(book) {
  return book === "" ? "主书架 · THE ROOM" : book;
}

function renderSelect() {
  const sel = $("docSelect");
  sel.innerHTML = "";
  docList.filter((d) => bookOf(d.name) === currentBook).forEach((d) => {
    const opt = document.createElement("option");
    opt.value = d.name;
    opt.textContent = fileLabel(d.name) + (d.readonly ? "（只读）" : "");
    if (current && d.name === current.name) opt.selected = true;
    sel.appendChild(opt);
  });
}

/* ===== 3D 星空（Hail Mary 风格：真实银河底图 + 透视星点 + 鼠标视差） ===== */
const cosmos = { raf: null, stars: null, ry: 0, rx: 0, tx: 0, ty: 0 };

function initStars() {
  cosmos.stars = [];
  for (let i = 0; i < 420; i++) {
    // 球壳内随机分布
    const th = Math.random() * Math.PI * 2;
    const ph = Math.acos(2 * Math.random() - 1);
    const r = 0.45 + Math.random() * 0.55;
    cosmos.stars.push({
      x: r * Math.sin(ph) * Math.cos(th),
      y: r * Math.cos(ph) * 0.6,
      z: r * Math.sin(ph) * Math.sin(th),
      size: Math.random() < 0.06 ? 1.8 + Math.random() * 1.4 : 0.5 + Math.random() * 0.9,
      gold: Math.random() < 0.12,
      tw: Math.random() * Math.PI * 2,
    });
  }
}

function drawStars(t) {
  const canvas = $("starCanvas");
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if (canvas.width !== w * dpr) { canvas.width = w * dpr; canvas.height = h * dpr; }
  const ctx = canvas.getContext("2d");
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);

  // 缓慢自转 + 鼠标视差偏转
  cosmos.ry += 0.00045;
  const ry = cosmos.ry + cosmos.tx * 0.35;
  const rx = cosmos.ty * 0.22;
  const cy = Math.cos(ry), sy = Math.sin(ry);
  const cx = Math.cos(rx), sx = Math.sin(rx);
  const f = Math.min(w, h) * 0.9;

  for (const s of cosmos.stars) {
    // 绕 Y 轴再绕 X 轴
    let x = s.x * cy + s.z * sy;
    let z = -s.x * sy + s.z * cy;
    let y = s.y * cx - z * sx;
    z = s.y * sx + z * cx;
    const depth = z + 1.6;
    if (depth < 0.25) continue;
    const px = w / 2 + (x / depth) * f;
    const py = h / 2 + (y / depth) * f;
    if (px < -10 || px > w + 10 || py < -10 || py > h + 10) continue;
    const tw = 0.65 + 0.35 * Math.sin(t / 900 + s.tw);
    const size = (s.size / depth) * 1.5;
    ctx.globalAlpha = Math.min(1, tw * (1.7 - depth * 0.55));
    ctx.fillStyle = s.gold ? "#d3b25c" : "#e8eef5";
    ctx.beginPath();
    ctx.arc(px, py, size, 0, Math.PI * 2);
    ctx.fill();
    if (s.size > 1.7) {  // 亮星：十字衍射芒
      ctx.globalAlpha *= 0.35;
      ctx.fillRect(px - size * 4, py - 0.4, size * 8, 0.8);
      ctx.fillRect(px - 0.4, py - size * 4, 0.8, size * 8);
    }
  }
  ctx.globalAlpha = 1;
  cosmos.raf = requestAnimationFrame(drawStars);
}

function startCosmos() {
  if (!cosmos.stars) initStars();
  if (!cosmos.raf) cosmos.raf = requestAnimationFrame(drawStars);
}

function stopCosmos() {
  if (cosmos.raf) cancelAnimationFrame(cosmos.raf);
  cosmos.raf = null;
}

document.addEventListener("mousemove", (e) => {
  if (!$("shelfView").classList.contains("open")) return;
  cosmos.tx = (e.clientX / window.innerWidth - 0.5);
  cosmos.ty = (e.clientY / window.innerHeight - 0.5);
  $("shelfBg").style.transform =
    `scale(1.06) translate(${-cosmos.tx * 14}px, ${-cosmos.ty * 10}px)`;
});

async function openShelf() {
  if (dirty) await save();
  renderShelfView();
  $("shelfView").classList.add("open");
  startCosmos();
  try { await loadList(); renderShelfView(); } catch (e) { /* 用缓存渲染 */ }
}

function renderShelfView() {
  const grid = $("shelfGrid");
  grid.innerHTML = "";
  const books = new Map();  // book → {count, cjk, en}
  docList.forEach((d) => {
    const b = bookOf(d.name);
    const s = books.get(b) || { count: 0, cjk: 0, en: 0 };
    s.count += 1;
    s.cjk += d.cjk || 0;
    s.en += d.en || 0;
    books.set(b, s);
  });
  if (!books.has("")) books.set("", { count: 0, cjk: 0, en: 0 });
  const maxWords = Math.max(1, ...Array.from(books.values()).map((s) => s.cjk + s.en));
  Array.from(books.keys())
    .sort((a, b) => (a === "" ? -1 : b === "" ? 1 : a.localeCompare(b)))
    .forEach((book) => {
      const s = books.get(book);
      const words = s.cjk + s.en;
      const card = document.createElement("div");
      card.className = "book-card";
      const name = document.createElement("div");
      name.className = "bc-name";
      name.textContent = bookLabel(book);
      const bar = document.createElement("div");
      bar.className = "bc-bar";
      const fill = document.createElement("i");
      fill.style.width = `${Math.max(4, Math.round((words / maxWords) * 100))}%`;
      bar.appendChild(fill);
      const meta = document.createElement("div");
      meta.className = "bc-meta";
      meta.textContent = `${s.count} 篇 · ${words.toLocaleString()} 字`;
      card.appendChild(name);
      card.appendChild(meta);
      card.appendChild(bar);
      card.onclick = () => switchBook(book);
      grid.appendChild(card);
    });
  const add = document.createElement("div");
  add.className = "book-card new";
  add.textContent = "＋ 开一本新书";
  add.onclick = newBook;
  grid.appendChild(add);
}

async function switchBook(book) {
  currentBook = book;
  localStorage.setItem("writing_book", book);
  $("shelfView").classList.remove("open");
  renderSelect();
  const lastDocs = JSON.parse(localStorage.getItem("writing_last_docs") || "{}");
  const remembered = docList.find((d) => d.name === lastDocs[book]);
  const first = remembered ||
                docList.find((d) => bookOf(d.name) === book && !d.readonly) ||
                docList.find((d) => bookOf(d.name) === book);
  if (first) await openDoc(first.name);
  else setSync(`「${bookLabel(book)}」还没有文稿，点「新建」开始写`, "");
}

async function newBook() {
  const book = (window.prompt("新书的名字（会在你的写作文件夹里创建同名子文件夹）", "") || "").trim();
  if (!book) return;
  if (/[/\\]/.test(book) || book.startsWith(".")) {
    setSync("书名不能包含斜杠或以点开头", "err");
    return;
  }
  let file = (window.prompt("第一篇的文件名", "第一章") || "").trim();
  if (!file) return;
  if (!/\.(md|txt)$/i.test(file)) file += ".md";
  const name = `${book}/${file}`;
  const data = await api("/writing/docs/put", {
    name, content: "", editor: "web", date: localDate(), baseUpdatedAt: null,
  });
  if (!data.ok) {
    setSync(`新建失败：${data.error}`, "err");
    return;
  }
  currentBook = book;
  localStorage.setItem("writing_book", book);
  await loadList();
  await openDoc(name);
  setSync(`新书「${book}」已开——同名文件夹稍后会出现在你的电脑里`, "ok");
}

async function loadList() {
  const data = await api("/writing/docs/list", { date: localDate() });
  if (!data.ok) throw new Error(data.error);
  docList = data.docs;
  if (data.today) {
    serverActiveMs = data.today.activeMs || 0;
    setTodayDelta(data.today.deltaCjk);
  }
  renderCounts();
  renderSelect();
  if (docList.length === 0) setSync("等待电脑首次同步，或点「新建」直接开写", "");
}

async function openDoc(name) {
  if (dirty) await save();
  const data = await api("/writing/docs/get", { name });
  if (!data.ok) {
    setSync(`打开失败：${data.error}`, "err");
    return;
  }
  current = { name, updatedAt: data.updatedAt, readonly: data.readonly, marks: data.marks || [] };
  currentBook = bookOf(name);
  localStorage.setItem("writing_book", currentBook);
  localStorage.setItem("writing_last_doc", name);
  const lastDocs = JSON.parse(localStorage.getItem("writing_last_docs") || "{}");
  lastDocs[currentBook] = name;
  localStorage.setItem("writing_last_docs", JSON.stringify(lastDocs));
  $("shelfView").classList.remove("open");
  stopCosmos();
  setEditorContent(data.content);
  editor.contentEditable = data.readonly ? "false" : "true";
  applyMode();
  reclassify();
  applyMarks();
  renderCounts();
  renderSelect();
  setSync(data.readonly ? "只读（Word 文档请在电脑上编辑）" : "已就绪", "ok");
}

editor.addEventListener("input", () => {
  dirty = true;
  trackTyping();
  rememberEditPos();
  reclassify();
  applyMarks();
  renderCounts();
  setSync("编辑中…", "busy");
  clearTimeout(saveTimer);
  saveTimer = setTimeout(save, SAVE_DEBOUNCE_MS);
});

async function save() {
  if (!current || current.readonly || !dirty) return;
  const content = getEditorContent();
  try {
    const sentActiveMs = Math.round(pendingActiveMs);
    const data = await api("/writing/docs/put", {
      name: current.name, content, editor: "web",
      date: localDate(), baseUpdatedAt: current.updatedAt,
      activeMs: sentActiveMs,
    });
    if (data.ok) {
      dirty = false;
      current.updatedAt = data.updatedAt;
      serverActiveMs = data.activeMs || 0;
      pendingActiveMs = Math.max(0, pendingActiveMs - sentActiveMs);
      localStorage.setItem("writing_pending_active", String(pendingActiveMs));
      renderCounts();
      setTodayDelta(data.deltaCjk);
      const t = new Date();
      const p = (n) => String(n).padStart(2, "0");
      setSync(`已同步 ${p(t.getHours())}:${p(t.getMinutes())}`, "ok");
    } else if (data.conflict) {
      localStorage.setItem("writing_conflict_backup", content);
      setSync("电脑上有更新的版本，已重新加载（你的改动暂存在本机）", "err");
      dirty = false;
      await openDoc(current.name);
    } else {
      throw new Error(data.error || "未知错误");
    }
  } catch (e) {
    setSync(`同步失败：${e.message}（8 秒后重试）`, "err");
    clearTimeout(saveTimer);
    saveTimer = setTimeout(save, 8000);
  }
}

async function newDoc() {
  let file = (window.prompt(`在「${bookLabel(currentBook)}」里新建（会同步到你的电脑文件夹）`, "新篇章") || "").trim();
  if (!file) return;
  if (!/\.(md|txt)$/i.test(file)) file += ".md";
  const name = currentBook ? `${currentBook}/${file}` : file;
  const data = await api("/writing/docs/put", {
    name, content: "", editor: "web", date: localDate(), baseUpdatedAt: null,
  });
  if (!data.ok) {
    setSync(`新建失败：${data.error}`, "err");
    return;
  }
  await loadList();
  await openDoc(name);
}

function copyDoc() {
  navigator.clipboard.writeText(getEditorContent()).then(
    () => setSync("已复制全文", "ok"),
    () => setSync("复制失败", "err")
  );
}

function editToken() {
  $("tokenInput").value = token;
  $("setup").classList.remove("hidden");
}

async function saveToken() {
  const v = $("tokenInput").value.trim();
  if (!v) return;
  token = v;
  localStorage.setItem("writing_token", v);
  $("setup").classList.add("hidden");
  await boot();
}

async function refresh() {
  if (!token || dirty) return;
  try {
    await loadList();
    if (current) {
      const meta = docList.find((d) => d.name === current.name);
      if (meta && meta.updatedAt > current.updatedAt) await openDoc(current.name);
    }
  } catch (e) { /* 下轮再试 */ }
}

async function boot() {
  try {
    await loadList();
    // 进门先看书架
    renderShelfView();
    $("shelfView").classList.add("open");
    startCosmos();
    setSync("从书架上取一本开始", "");
  } catch (e) {
    setSync(`连接失败：${e.message}`, "err");
  }
}

/* ===== 启动 ===== */
applyPrefs();
renderActiveClock();
setInterval(tickActive, 1000);
if (token) {
  $("setup").classList.add("hidden");
  boot();
}
setInterval(refresh, REFRESH_MS);
setInterval(renderCounts, 30000);
window.addEventListener("beforeunload", () => { if (dirty) save(); });
</script>
</body>
</html>
